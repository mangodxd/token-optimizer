<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <!--
    Token Optimizer hero – Claude Code terminal running /token-optimizer.
    16s loop. Catppuccin Mocha palette. Pure SMIL animations.
    Numbers: Post-Tool-Search (Feb 2026). ~33K tokens typical unaudited overhead.
    Sources: Anthropic Tool Search docs, /context output, community measurements.
  -->
  <defs>
    <clipPath id="tc"><rect width="800" height="520" rx="10"/></clipPath>
    <clipPath id="ty">
      <rect x="0" y="108" width="0" height="28">
        <animate attributeName="width"
          values="0;0;800;800;800;0;0"
          keyTimes="0;0.03;0.12;0.84;0.88;0.88;1"
          dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Terminal background -->
  <g clip-path="url(#tc)">
    <rect width="800" height="520" fill="#1e1e2e"/>
    <rect width="800" height="36" fill="#181825"/>
    <rect y="484" width="800" height="36" fill="#181825"/>
    <line x1="0" y1="484" x2="800" y2="484" stroke="#313244" stroke-width="1"/>
  </g>
  <rect width="800" height="520" rx="10" fill="none" stroke="#313244" stroke-width="1.5"/>

  <!-- Traffic lights -->
  <circle cx="18" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="36" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="54" cy="18" r="6" fill="#a6e3a1"/>

  <!-- Title bar -->
  <text x="400" y="23" text-anchor="middle" fill="#6c7086" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="13">Claude Code — ~/.claude</text>

  <!-- Claude Code header -->
  <text x="28" y="62" fill="#cdd6f4" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="16" font-weight="bold">Claude Code</text>
  <text x="172" y="62" fill="#6c7086" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14">v2.1.59</text>
  <text x="28" y="82" fill="#6c7086" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="12">Opus 4.6 · Claude Max · ~/.claude</text>

  <!-- Separator -->
  <line x1="20" y1="98" x2="780" y2="98" stroke="#313244" stroke-width="0.5"/>

  <!-- User prompt (typing animation) -->
  <text clip-path="url(#ty)" x="28" y="128" fill="#89b4fa" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="16" font-weight="bold">&#x276F; /token-optimizer</text>

  <!-- Status line -->
  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;0.14;0.17;0.84;0.88;1"
      dur="16s" repeatCount="indefinite"/>
    <text x="28" y="158" fill="#a6e3a1" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="13" font-style="italic">[Token Optimizer Initialized]</text>
  </g>

  <!-- Dispatching agents -->
  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;0.19;0.22;0.84;0.88;1"
      dur="16s" repeatCount="indefinite"/>
    <text x="28" y="186" fill="#f9e2af" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14">Dispatching 6 audit agents...</text>
  </g>

  <!-- Agent names appearing one by one -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.24;0.26;0.84;0.88;1" dur="16s" repeatCount="indefinite"/>
    <text x="44" y="206" fill="#585b70" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="12">claude-md · memory-md · skills · mcp · commands · advanced</text>
  </g>

  <!-- Results: CURRENT STATE header -->
  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;0.30;0.34;0.84;0.88;1"
      dur="16s" repeatCount="indefinite"/>
    <text x="28" y="238" fill="#cdd6f4" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14" font-weight="bold">CURRENT STATE</text>
  </g>

  <!-- Current state details -->
  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;0.36;0.40;0.84;0.88;1"
      dur="16s" repeatCount="indefinite"/>
    <text fill="#bac2de" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14">
      <tspan x="28" y="260">Per-message overhead:  </tspan>
      <tspan fill="#f38ba8" font-weight="bold">~33,000 tokens</tspan>
    </text>
    <text fill="#bac2de" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14">
      <tspan x="28" y="280">Context window:        </tspan>
      <tspan fill="#f9e2af">16% used before your first message</tspan>
    </text>
    <text fill="#bac2de" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14">
      <tspan x="28" y="300">Controllable overhead: </tspan>
      <tspan fill="#89b4fa">~18,000 tokens (this is what you fix)</tspan>
    </text>
  </g>

  <!-- QUICK WINS header -->
  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;0.46;0.50;0.84;0.88;1"
      dur="16s" repeatCount="indefinite"/>
    <text x="28" y="332" fill="#a6e3a1" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14" font-weight="bold">QUICK WINS</text>
  </g>

  <!-- Quick win items -->
  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;0.52;0.55;0.84;0.88;1"
      dur="16s" repeatCount="indefinite"/>
    <text fill="#bac2de" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14">
      <tspan x="28" y="356">&#xB7; Slim CLAUDE.md:           </tspan><tspan fill="#a6e3a1">Save ~2,900 tokens/msg</tspan>
    </text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;0.56;0.59;0.84;0.88;1"
      dur="16s" repeatCount="indefinite"/>
    <text fill="#bac2de" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14">
      <tspan x="28" y="380">&#xB7; Archive 25 skills:       </tspan><tspan fill="#a6e3a1">Save ~2,500 tokens/msg</tspan>
    </text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;0.60;0.63;0.84;0.88;1"
      dur="16s" repeatCount="indefinite"/>
    <text fill="#bac2de" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14">
      <tspan x="28" y="404">&#xB7; Add .claudeignore:       </tspan><tspan fill="#a6e3a1">Save ~2,000 tokens/msg</tspan>
    </text>
  </g>

  <!-- Total savings line -->
  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;0.66;0.70;0.84;0.88;1"
      dur="16s" repeatCount="indefinite"/>
    <line x1="28" y1="420" x2="520" y2="420" stroke="#313244" stroke-width="0.5"/>
    <text x="28" y="442" fill="#a6e3a1" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14" font-weight="bold">Full config savings: ~11,300 tokens/msg (16% &#x2192; 11%)</text>
  </g>

  <!-- Blinking cursor -->
  <rect x="28" y="456" width="9" height="16" fill="#89b4fa">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.4;0.5;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Status bar -->
  <text x="14" y="506" fill="#a6adc8" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="12">[Opus 4.6] ~/.claude · main</text>

  <!-- Context progress bar (16% fill → 11% after) -->
  <rect x="340" y="496" width="100" height="10" rx="5" fill="#313244"/>
  <rect x="340" y="496" width="16" height="10" rx="5" fill="#f9e2af"/>
  <text x="448" y="506" fill="#f9e2af" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="12">16%</text>

  <!-- Right status -->
  <text x="786" y="506" text-anchor="end" fill="#585b70" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="12">167K tokens remaining</text>
</svg>
